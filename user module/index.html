<!DOCTYPE html>
<html lang="en">
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="left">
        <img src="https://www.clipartmax.com/png/middle/51-514952_user-login-icon-by-aha-soft-user-login-icon.png">
    </div>

    <div class="right">
        <h2>Let's Start</h2>
        <p>Login to continue your learning journey</p>

        <form>
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>

            <button>Login</button>
        </form>

        <p>Don't have an account? 
            <a href="signup.html">Signup</a>
        </p>
    </div>
</div>

</body>
</html>
